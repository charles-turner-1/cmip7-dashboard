term: payu
short: The workflow tool ACCESS-NRI uses to configure, run and track model experiments.
long: >-
  payu is a workflow-management tool for running climate-model experiments
  reproducibly on supercomputers. ACCESS uses it to lay out each experiment,
  submit its runs and record metadata — which is where much of the run telemetry
  on this dashboard comes from.
aliases:
  - Payu
links:
  - title: "payu documentation"
    url: "https://payu.readthedocs.io/"
