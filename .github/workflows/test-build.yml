name: Validate Nuxt Build

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest

    env:
      NITRO_PRESET: github_pages
      NUXT_APP_BASE_URL: /cmip7-dashboard/
      NUXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NUXT_PUBLIC_POSTHOG_KEY }}
      NUXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NUXT_PUBLIC_POSTHOG_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint formatting with Prettier
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage -- --run

      - name: Upload code coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/cobertura-coverage.xml
          fail_ci_if_error: false

      - name: Generate static site
        run: NODE_ENV=production npm run generate

      - name: Check build artifacts
        run: |
          if [ ! -d ".output/public" ]; then
            echo "Build failed: .output/public directory not created"
            exit 1
          fi
          if [ ! -f ".output/public/index.html" ]; then
            echo "Build failed: index.html not found in .output/public"
            exit 1
          fi
          echo "Build successful! Generated files:"
          ls -la .output/public/
