name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      NITRO_PRESET: github_pages
      NUXT_APP_BASE_URL: /cmip7-dashboard/
      NUXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NUXT_PUBLIC_POSTHOG_KEY }}
      NUXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NUXT_PUBLIC_POSTHOG_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --run

      - name: Upload code coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/cobertura-coverage.xml
          fail_ci_if_error: false

      - name: Determine version tag
        id: version
        run: |
          BASE_TAG="v$(date -u +'%Y.%m.%d')"
          COUNTER=0
          TAG="${BASE_TAG}-${COUNTER}"
          while git tag -l "$TAG" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            TAG="${BASE_TAG}-${COUNTER}"
          done
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate static site
        run: NODE_ENV=production npm run generate

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./.output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

      - name: Create version tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
