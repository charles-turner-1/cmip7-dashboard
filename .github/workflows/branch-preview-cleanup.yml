# TEMP (branch previews): removes /branches/<slug>/ from gh-pages when a PR
# closes, so stale previews don't accumulate. Delete this file to revert.
name: PR preview cleanup

on:
  pull_request:
    types: [closed]

concurrency:
  group: preview-cleanup-${{ github.head_ref }}
  cancel-in-progress: false

permissions:
  contents: write # push to gh-pages

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview folder
        run: |
          SLUG="${{ github.head_ref }}"
          SLUG="${SLUG//\//-}"
          DIR="branches/$SLUG"
          if [ ! -d "$DIR" ]; then
            echo "No preview at $DIR; nothing to clean up."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -r "$DIR"
          git commit -m "Remove preview for closed PR: $SLUG"
          git push origin gh-pages
